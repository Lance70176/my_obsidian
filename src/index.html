<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>MyObsidian</title>
  <link id="hljs-dark" rel="stylesheet" href="../node_modules/highlight.js/styles/github-dark.min.css">
  <link id="hljs-light" rel="stylesheet" href="../node_modules/highlight.js/styles/github.min.css" disabled>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <span id="app-title">MyObsidian</span>
    <div id="toolbar">
      <button id="btn-open-vault" title="開啟 Vault 資料夾">📂 開啟 Vault</button>
      <span class="toolbar-sep"></span>
      <div id="mode-group">
        <button id="btn-mode-edit" data-mode="edit" title="編輯模式 (⌘1)">編輯</button>
        <button id="btn-mode-split" data-mode="split" title="分割模式 (⌘2)">分割</button>
        <button id="btn-mode-preview" data-mode="preview" title="預覽模式 (⌘3)">預覽</button>
      </div>
      <span class="toolbar-sep"></span>
      <button id="btn-export" title="匯出目前筆記(HTML / PDF / Markdown)或整個 Vault">⬇ 匯出</button>
      <span class="toolbar-sep"></span>
      <button id="btn-claude-sync" title="把本機 Claude Code 記憶彙整成一份筆記(開啟 Vault 時會自動更新)">🧠 Claude 記憶</button>
      <span class="toolbar-sep"></span>
      <button id="btn-theme" title="切換深/淺色主題">🌙</button>
    </div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-actions">
        <button id="btn-new-note" title="新增筆記 (⌘N)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button id="btn-new-folder" title="新增資料夾">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
        <button id="btn-collapse-all" title="全部收合">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>
        </button>
      </div>
      <div id="vault-header">
        <span id="vault-name">尚未開啟 Vault</span>
      </div>
      <input id="tree-filter" type="text" placeholder="搜尋筆記…" spellcheck="false">
      <div id="file-tree"></div>
    </aside>
    <div id="sidebar-resizer"></div>
    <main id="main">
      <div id="empty-state">
        <div class="empty-inner">
          <h2>MyObsidian</h2>
          <p>開啟一個 Vault 資料夾開始編輯 Markdown 筆記。</p>
          <button id="btn-open-vault-2">📂 開啟 Vault</button>
        </div>
      </div>
      <section id="editor-pane" hidden>
        <textarea id="editor" spellcheck="false" placeholder="# 開始書寫…"></textarea>
      </section>
      <section id="preview-pane" hidden>
        <article id="preview" class="markdown-body"></article>
      </section>
    </main>
  </div>

  <div id="statusbar">
    <span id="status-file">—</span>
    <span id="status-right">
      <span id="status-count"></span>
      <span id="status-save"></span>
    </span>
  </div>

  <div id="modal-overlay" hidden>
    <div id="modal">
      <div id="modal-title"></div>
      <input id="modal-input" type="text" spellcheck="false">
      <div id="modal-msg"></div>
      <div id="modal-buttons">
        <button id="modal-cancel">取消</button>
        <button id="modal-ok" class="primary">確定</button>
      </div>
    </div>
  </div>

  <ul id="context-menu" hidden></ul>

  <script src="../node_modules/mermaid/dist/mermaid.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
